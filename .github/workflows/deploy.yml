name: Build and Deploy to BigRock FTP

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: Deploy to FTP
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        # Uses clean install for exact dependency matching from package-lock.json
        run: npm ci

      - name: Build Next.js Static Export
        run: npm run build

      - name: Upload to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # Path to upload the static export directory
          local-dir: ./out/
          # Path on the server where files should go
          server-dir: ./public_html/
